name: Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - 'spotshare_app/**'
      - 'scripts/**'
      - 'dist/**'
      - 'data/**'
      - '.github/workflows/deploy_flutter_web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Data Dependencies
        run: pip install pandas openpyxl numpy

      - name: ⚙️ Process Static Parking Data
        run: |
          mkdir -p dist
          # Create dummy .env inside spotshare_app to satisfy pubspec.yaml
          touch spotshare_app/.env
          # Only run process if JSON is missing, otherwise use the pre-generated one from the repo
          if [ ! -f dist/parking_data.json ]; then
            python scripts/process_parking_data.py
          fi

      - name: 💙 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: 💙 Build Flutter Web
        run: |
          cd spotshare_app
          flutter pub get
          flutter build web --release --web-renderer canvaskit

      - name: 📦 Finalize Deployment Bundle
        run: |
          mkdir -p spotshare_app/build/web
          cp dist/parking_data.json spotshare_app/build/web/parking_data.json
          # Double check file is there
          ls -l spotshare_app/build/web/parking_data.json

      - name: 🔥 Deploy to Firebase
        uses: w9jds/firebase-action@v13.7.2
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: spotshare-5103d
