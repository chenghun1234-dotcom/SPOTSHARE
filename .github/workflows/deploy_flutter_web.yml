name: Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - 'spotshare_app/**'
      - '.github/workflows/deploy_flutter_web.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Data Dependencies
        run: pip install pandas openpyxl

      - name: ⚙️ Process Static Parking Data
        run: |
          touch spotshare_app/.env
          python scripts/process_parking_data.py
          mkdir -p spotshare_app/web
          cp dist/parking_data.json spotshare_app/web/parking_data.json

      - name: 💙 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: 🏗️ Build Web App
        run: |
          cd spotshare_app
          flutter pub get
          flutter build web --release --web-renderer canvaskit
          # CRITICAL: Copy data to build folder AFTER Flutter build clears/populates it
          cp ../dist/parking_data.json build/web/parking_data.json

      - name: 🚀 Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v13.7.2
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: spotshare-5103d
