name: 🅿️ Deploy Static Parking Data

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/process_parking_data.py'
      - '.github/workflows/deploy_static_data.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install pandas openpyxl

      - name: ⚙️ Process Data
        run: python scripts/process_parking_data.py

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
