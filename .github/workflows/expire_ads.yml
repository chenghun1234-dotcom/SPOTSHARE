name: Expire Old Ads
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  expire_ads:
    runs-on: ubuntu-latest
    steps:
      - name: Call Firebase Function to Cleanup Ads
        run: |
          curl -X POST "https://YOUR_REGION-YOUR_PROJECT.cloudfunctions.net/cleanupExpiredAds" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET_KEY }}"
